<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMI - Generador de Iconos PWA</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #FBFBFD;
      color: #1d1d1f;
    }
    h1 { color: #0071E3; }
    .icon-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    canvas { border-radius: 12px; }
    a.download {
      display: inline-block;
      padding: 10px 20px;
      background: #0071E3;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
    }
    a.download:hover { background: #0060c0; }
    .info { color: #6e6e73; font-size: 14px; }
  </style>
</head>
<body>
  <h1>MIMI - Generador de Iconos PWA</h1>
  <p class="info">
    Haz clic en los enlaces de descarga para obtener cada icono PNG.
    Luego coloca los archivos descargados en <code>frontend/public/icons/</code>.
  </p>

  <div id="icons"></div>

  <script>
    const icons = [
      { name: 'icon-192.png', size: 192, maskable: false },
      { name: 'icon-512.png', size: 512, maskable: false },
      { name: 'icon-maskable-512.png', size: 512, maskable: true },
    ];

    function drawIcon(canvas, size, maskable) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;

      // Fondo
      if (maskable) {
        // Para maskable, el area segura es el 80% central
        // Rellenar todo el canvas con el color de fondo
        ctx.fillStyle = '#0071E3';
        ctx.fillRect(0, 0, size, size);
      } else {
        // Fondo transparente con cuadrado redondeado
        ctx.clearRect(0, 0, size, size);
        const radius = size * 0.22;
        const margin = size * 0.02;
        ctx.beginPath();
        ctx.moveTo(margin + radius, margin);
        ctx.lineTo(size - margin - radius, margin);
        ctx.quadraticCurveTo(size - margin, margin, size - margin, margin + radius);
        ctx.lineTo(size - margin, size - margin - radius);
        ctx.quadraticCurveTo(size - margin, size - margin, size - margin - radius, size - margin);
        ctx.lineTo(margin + radius, size - margin);
        ctx.quadraticCurveTo(margin, size - margin, margin, size - margin - radius);
        ctx.lineTo(margin, margin + radius);
        ctx.quadraticCurveTo(margin, margin, margin + radius, margin);
        ctx.closePath();
        ctx.fillStyle = '#0071E3';
        ctx.fill();
      }

      // Texto "MI"
      const fontSize = maskable ? size * 0.32 : size * 0.38;
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('MI', size / 2, size / 2 + fontSize * 0.03);

      // Subtexto "MI" (segunda linea decorativa pequena)
      const subSize = fontSize * 0.22;
      ctx.font = `500 ${subSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('MENTOR', size / 2, size / 2 + fontSize * 0.52);
    }

    const container = document.getElementById('icons');

    icons.forEach(icon => {
      const row = document.createElement('div');
      row.className = 'icon-row';

      const canvas = document.createElement('canvas');
      const displaySize = Math.min(icon.size, 192);
      canvas.style.width = displaySize + 'px';
      canvas.style.height = displaySize + 'px';

      drawIcon(canvas, icon.size, icon.maskable);

      const info = document.createElement('div');
      info.innerHTML = `
        <strong>${icon.name}</strong><br>
        <span class="info">${icon.size}x${icon.size}px ${icon.maskable ? '(maskable)' : ''}</span><br><br>
        <a class="download" href="${canvas.toDataURL('image/png')}" download="${icon.name}">Descargar ${icon.name}</a>
      `;

      row.appendChild(canvas);
      row.appendChild(info);
      container.appendChild(row);
    });
  </script>
</body>
</html>
